name: Auto-merge Jules PRs

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Only auto-merge PRs that ONLY touch research_logs/
    if: github.actor == 'ruffian-l'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify PR only touches research_logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only)
          echo "Files changed:"
          echo "$FILES"

          # Check every file is inside research_logs/
          is_research_only="true"
          while IFS= read -r file; do
            if [[ -n "$file" && "$file" != research_logs/* ]]; then
              echo "PR modifies '$file' which is outside research_logs/ - Skipping auto-merge."
              is_research_only="false"
              break
            fi
          done <<< "$FILES"

          if [[ "$is_research_only" == "true" ]]; then
            echo "All files are inside research_logs/ -- safe to merge."
            echo "DO_MERGE=true" >> "$GITHUB_ENV"
          else
            echo "DO_MERGE=false" >> "$GITHUB_ENV"
          fi

      - name: Auto-merge
        if: env.DO_MERGE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Merging PR #${{ github.event.pull_request.number }}"
          gh pr merge ${{ github.event.pull_request.number }} --squash --admin
