# GitLab CI/CD Pipeline for hydrodynamic-swarm
# Enforces quality gates: lint, test, audit, security, build

stages:
  - lint
  - test
  - audit
  - security
  - build

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  RUST_BACKTRACE: "1"

# Cache Cargo registry and build artifacts
cache:
  key: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
  paths:
    - .cargo/
    - target/

# === LINT STAGE ===

clippy:
  stage: lint
  image: rust:1.75
  script:
    - rustup component add clippy
    - echo "[CI] Running clippy with -D warnings (blocks on any warnings)"
    - cargo clippy --release --all-targets -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

fmt-check:
  stage: lint
  image: rust:1.75
  script:
    - rustup component add rustfmt
    - echo "[CI] Checking code formatting"
    - cargo fmt --all -- --check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

machete:
  stage: lint
  image: rust:1.75
  script:
    - echo "[CI] Installing cargo-machete"
    - cargo install cargo-machete
    - echo "[CI] Checking for unused dependencies"
    - cargo machete
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: false  # Block on unused deps

# === TEST STAGE ===

cargo-test:
  stage: test
  image: rust:1.75
  script:
    - echo "[CI] Running test suite (19 tests across 4 modules)"
    - cargo test --release --verbose
    - echo "[CI] Test summary:"
    - echo "  - config.rs: 5 tests"
    - echo "  - field.rs: 4 tests"
    - echo "  - memory.rs: 7 tests"
    - echo "  - gpu.rs: 3 tests"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# === AUDIT STAGE ===

cargo-audit:
  stage: audit
  image: rust:1.75
  script:
    - echo "[CI] Installing cargo-audit"
    - cargo install cargo-audit
    - echo "[CI] Checking for security vulnerabilities"
    - cargo audit
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true  # Advisory only, don't block

# === SECURITY STAGE ===

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# === BUILD STAGE ===

build-release:
  stage: build
  image: rust:1.75
  script:
    - echo "[CI] Building release binary"
    - cargo build --release
    - echo "[CI] Build complete: target/release/hydrodynamic-swarm"
    - ls -la target/release/
  artifacts:
    name: "hydrodynamic-swarm-$CI_COMMIT_SHORT_SHA"
    paths:
      - target/release/hydrodynamic-swarm
      - target/release/crucible
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-crucible:
  stage: build
  image: rust:1.75
  script:
    - echo "[CI] Building crucible test suite"
    - cargo build --release --bin crucible
    - echo "[CI] Crucible build complete"
  artifacts:
    name: "crucible-$CI_COMMIT_SHORT_SHA"
    paths:
      - target/release/crucible
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# === SCHEDULED JOBS ===

# Nightly crucible run (requires GPU runner or CPU fallback)
crucible-nightly:
  stage: test
  image: rust:1.75
  script:
    - echo "[CI] Running nightly crucible suite (8 prompts)"
    - cargo build --release --bin crucible
    - echo "[CI] Starting crucible with 200 tokens per prompt"
    - ./target/release/crucible 200 || echo "[WARN] Crucible failed, check logs"
    - echo "[CI] Crucible complete, check artifacts for results"
  artifacts:
    name: "crucible-results-$CI_COMMIT_SHORT_SHA"
    paths:
      - logs/crucible_*.txt
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  allow_failure: true  # Don't block on crucible failures
  # Uncomment when GPU runners available:
  # tags:
  #   - gpu

# Weekly dependency update check
dependency-check:
  stage: audit
  image: rust:1.75
  script:
    - echo "[CI] Weekly dependency audit"
    - cargo install cargo-audit
    - cargo audit
    - echo "[CI] Checking for outdated dependencies"
    - cargo install cargo-outdated
    - cargo outdated
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  allow_failure: true
