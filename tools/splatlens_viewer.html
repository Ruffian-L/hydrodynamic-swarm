<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>SplatLens -- Token Field Visualizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #0F111A;
      overflow: hidden;
      font-family: 'Inter', 'SF Pro', system-ui, sans-serif
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh
    }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #7B8CA8;
      font-size: 12px;
      background: rgba(15, 17, 26, 0.88);
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid rgba(80, 100, 140, 0.15);
      max-width: 420px;
      backdrop-filter: blur(14px);
      pointer-events: auto;
      z-index: 10;
    }

    #hud h2 {
      color: #A0B4D0;
      font-size: 14px;
      margin-bottom: 4px;
      letter-spacing: 1.5px;
      font-weight: 600
    }

    #hud p {
      color: #5A6A82;
      font-size: 11px;
      line-height: 1.5
    }

    .legend {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: #5A6A82
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block
    }

    #gen-text {
      position: fixed;
      top: 16px;
      right: 16px;
      color: #A0B4D0;
      font-size: 13px;
      background: rgba(15, 17, 26, 0.88);
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid rgba(80, 100, 140, 0.15);
      max-width: 380px;
      max-height: 55vh;
      overflow-y: auto;
      backdrop-filter: blur(14px);
      z-index: 10;
      line-height: 1.7;
      word-wrap: break-word;
      font-family: 'SF Mono', Monaco, Consolas, monospace;
    }

    #gen-text .token-current {
      color: #D4A44C;
      font-weight: bold
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      background: rgba(15, 17, 26, 0.9);
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid rgba(80, 100, 140, 0.12);
      backdrop-filter: blur(14px);
      z-index: 10;
    }

    #controls button {
      background: rgba(60, 80, 120, 0.15);
      border: 1px solid rgba(80, 100, 140, 0.2);
      color: #6A7A96;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    #controls button:hover {
      background: rgba(60, 80, 120, 0.3)
    }

    #controls button.active {
      background: rgba(64, 224, 208, 0.15);
      color: #40E0D0;
      border-color: rgba(64, 224, 208, 0.3)
    }

    #controls button.off {
      opacity: 0.3;
      border-color: rgba(80, 100, 140, 0.08)
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .slider-group label {
      color: #4A5A72;
      font-size: 10px;
      white-space: nowrap
    }

    .ctrl-slider {
      width: 80px;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(60, 80, 120, 0.25);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .ctrl-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #40E0D0;
      border: 2px solid #0F111A;
      cursor: pointer;
    }

    #step-label {
      color: #4A5A72;
      font-size: 11px;
      min-width: 55px;
      text-align: center
    }

    #speed-label {
      color: #4A5A72;
      font-size: 10px;
      min-width: 30px;
      text-align: center
    }

    #settings-btn {
      position: fixed;
      bottom: 70px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(15, 17, 26, 0.85);
      border: 1px solid rgba(80, 100, 140, 0.2);
      color: #6A7A96;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 11;
      backdrop-filter: blur(14px);
      transition: all 0.15s;
    }

    #settings-btn:hover {
      background: rgba(60, 80, 120, 0.3);
      color: #40E0D0
    }

    #settings-panel {
      position: fixed;
      bottom: 70px;
      right: 64px;
      background: rgba(15, 17, 26, 0.94);
      border: 1px solid rgba(80, 100, 140, 0.15);
      border-radius: 12px;
      padding: 16px 20px;
      backdrop-filter: blur(14px);
      z-index: 11;
      display: none;
      min-width: 220px;
    }

    #settings-panel.open {
      display: block
    }

    #settings-panel h3 {
      color: #A0B4D0;
      font-size: 12px;
      margin: 0 0 10px;
      letter-spacing: 1px;
      font-weight: 600
    }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px
    }

    .setting-row label {
      color: #5A6A82;
      font-size: 10px;
      min-width: 60px
    }

    .setting-row .ctrl-slider {
      width: 90px
    }

    .setting-row span {
      color: #4A5A72;
      font-size: 10px;
      min-width: 28px;
      text-align: right
    }

    .mode-btn {
      background: rgba(60, 80, 120, 0.15);
      border: 1px solid rgba(80, 100, 140, 0.2);
      color: #6A7A96;
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .mode-btn:hover {
      background: rgba(60, 80, 120, 0.3)
    }

    .mode-btn.active {
      background: rgba(64, 224, 208, 0.15);
      color: #40E0D0;
      border-color: rgba(64, 224, 208, 0.3)
    }

    #prompt-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 12;
      background: rgba(15, 17, 26, 0.92);
      padding: 10px 16px;
      border-radius: 14px;
      border: 1px solid rgba(80, 100, 140, 0.18);
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    #prompt-bar label {
      color: #5A6A82;
      font-size: 11px;
      white-space: nowrap;
      letter-spacing: 0.5px
    }

    #prompt-input {
      background: rgba(30, 35, 50, 0.6);
      border: 1px solid rgba(80, 100, 140, 0.15);
      color: #C8D8F0;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 8px;
      outline: none;
      width: 420px;
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      transition: border-color 0.2s;
    }

    #prompt-input:focus {
      border-color: rgba(64, 224, 208, 0.4)
    }

    #replay-btn {
      background: linear-gradient(135deg, rgba(64, 224, 208, 0.2), rgba(64, 224, 208, 0.08));
      border: 1px solid rgba(64, 224, 208, 0.35);
      color: #40E0D0;
      font-size: 12px;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    #replay-btn:hover {
      background: linear-gradient(135deg, rgba(64, 224, 208, 0.35), rgba(64, 224, 208, 0.15));
      box-shadow: 0 0 16px rgba(64, 224, 208, 0.2)
    }
  </style>
</head>

<body>
  <div id="prompt-bar">
    <label>PROMPT</label>
    <input type="text" id="prompt-input" value="Explain the Physics of Friendship in one paragraph." spellcheck="false">
    <button id="replay-btn">Replay</button>
  </div>
  <div id="hud" style="top:72px">
    <h2>SPLATLENS</h2>
    <p>"Explain the Physics of Friendship in one paragraph."</p>
    <p>50 steps | 5131 field pts</p>
    <div class="legend">
      <span><span class="dot" style="background:#40E0D0"></span>Trail</span>
      <span><span class="dot" style="background:#F0E6C8"></span>Jump</span>
      <span><span class="dot" style="background:#D4A44C"></span>Goal</span>
      <span><span class="dot" style="background:#1E2840"></span>Field</span>
      <span><span class="dot" style="background:#2DD4A8"></span>Pleasure</span>
      <span><span class="dot" style="background:#8B3A3A"></span>Pain</span>
      <span><span class="dot" style="background:#C49650"></span>Attractors</span>
    </div>
    <p style="margin-top:6px;color:#2A3448">Drag=orbit | Scroll=zoom | Shift+drag=pan</p>
  </div>
  <div id="gen-text"></div>
  <div id="controls">
    <button id="btn-play" class="active">Play</button>
    <button id="btn-pause">Pause</button>
    <div class="slider-group">
      <label>Step</label>
      <input type="range" id="scrubber" class="ctrl-slider" style="width:140px" min="0" max="49" value="49">
      <span id="step-label">50/50</span>
    </div>
    <div class="slider-group">
      <label>Speed</label>
      <input type="range" id="speed" class="ctrl-slider" min="30" max="800" value="200">
      <span id="speed-label">200ms</span>
    </div>
    <span style="color:#1A1E2A;margin:0 2px">|</span>
    <button id="btn-field" class="active">Field</button>
    <button id="btn-trail" class="active">Trail</button>
    <button id="btn-splats" class="active">Splats</button>
    <button id="btn-tokens" class="active">Tokens</button>
  </div>
  <button id="settings-btn" aria-label="Settings" title="Settings">&#9881;</button>
  <div id="settings-panel">
    <h3>SETTINGS</h3>
    <div class="setting-row">
      <label>Theme</label>
      <button id="btn-dark" class="mode-btn active">Dark</button>
      <button id="btn-light" class="mode-btn">Light</button>
    </div>
    <div class="setting-row">
      <label>Rotate</label>
      <button id="btn-rotate-on" class="mode-btn active">On</button>
      <button id="btn-rotate-off" class="mode-btn">Off</button>
    </div>
    <div class="setting-row">
      <label>UI Scale</label>
      <input type="range" id="ui-scale" class="ctrl-slider" min="50" max="150" value="100">
      <span id="ui-scale-val">100%</span>
    </div>
    <div class="setting-row">
      <label>Text Size</label>
      <input type="range" id="text-scale" class="ctrl-slider" min="50" max="200" value="100">
      <span id="text-scale-val">100%</span>
    </div>
    <div class="setting-row">
      <label>Particles</label>
      <input type="range" id="particle-density" class="ctrl-slider" min="0" max="300" value="80">
      <span id="particle-val">80</span>
    </div>
  </div>

      if (showTrail && steps > 1) {
        const idx = Math.min(steps - 1, tC.length - 1);
        const ep = project(tC[idx][0], tC[idx][1], tC[idx][2]);
        if (ep) drawCircle(ep.x, ep.y, Math.max(3, 8 * dpr / ep.z), '#D4A44C', 0.8);
      }

      // ==== Splat scars (muted teal / rust) ====
      if (showSplats) {
        for (let i = 0; i < spC.length; i++) {
          const p = project(spC[i][0], spC[i][1], spC[i][2]);
          if (p && p.z > 0) {
            const isPleasure = (SA[i] || 1) > 0;
            const col = isPleasure ? '#2DD4A8' : '#8B3A3A';
            const r = Math.max(2, 6 * dpr / p.z);
            if (isPleasure) drawCircle(p.x, p.y, r * 2, col, 0.05);
            drawCircle(p.x, p.y, r, col, 0.45);
          }
        }
      }

      // ==== Ephemeral token attraction orbs (screen-space fan, fixed pixel radius) ====
      if (showTokens) {
        const fadeWindow = 5;
        for (let si = Math.max(0, steps - fadeWindow); si < steps; si++) {
          if (!nbC[si] || nbC[si].length === 0) continue;
          const age = steps - 1 - si;
          const fade = Math.max(0, 1 - age / fadeWindow);
          const stepP = project(tC[si][0], tC[si][1], tC[si][2]);
          if (!stepP) continue;
          const neighbors = nbC[si].filter(nb => nb.s >= 0.001);
          const count = neighbors.length;
          if (!count) continue;
          const fanR = 110 * dpr; // fixed pixel radius -- zoom independent
          const startAngle = -Math.PI * 0.8;
          const sweep = Math.PI * 1.6;
          for (let j = 0; j < count; j++) {
            const nb = neighbors[j]; const prob = nb.s;
            // Fan position in screen space around trajectory point
            const angle = startAngle + (j / (Math.max(count - 1, 1))) * sweep;
            const ox = stepP.x + Math.cos(angle) * fanR * (0.7 + prob * 0.3);
            const oy = stepP.y + Math.sin(angle) * fanR * (0.7 + prob * 0.3);
            // Orb
            const orbR = Math.max(4, (5 + prob * 10) * dpr);
            const color = `hsl(35,65%,${45 + prob * 15}%)`;
            drawCircle(ox, oy, orbR * 1.5, color, 0.08 * fade);
            drawCircle(ox, oy, orbR, color, 0.6 * fade);
            // Connection line (current step only)
            if (age === 0) {
              ctx.globalAlpha = 0.2; ctx.strokeStyle = color; ctx.lineWidth = 1 * dpr;
              ctx.setLineDash([3 * dpr, 3 * dpr]);
              ctx.beginPath(); ctx.moveTo(stepP.x, stepP.y); ctx.lineTo(ox, oy); ctx.stroke();
              ctx.setLineDash([]);
            }
            // Label with pill background + halo text
            if (fade > 0.3) {
              const label = nb.t.trim();
              if (label.length > 0 && label.length < 25) {
                const fs = Math.round(14 * dpr * ts_f);
                ctx.font = `700 ${fs}px 'Inter','SF Pro',system-ui,sans-serif`;
                ctx.textBaseline = 'middle';
                const probText = `${(prob * 100).toFixed(1)}%`;
                const fullText = label + '  ' + probText;
                const tw = ctx.measureText(fullText).width;
                const lx = ox + orbR + 5 * dpr;
                // Background pill
                ctx.globalAlpha = 0.85 * fade; ctx.fillStyle = 'rgba(15,17,26,0.92)';
                drawPill(lx - 4 * dpr, oy - fs / 2 - 3 * dpr, tw + 10 * dpr, fs + 6 * dpr, 4 * dpr); ctx.fill();
                // Token name -- bright
                haloText(label, lx, oy, '#E0D0A0', fade);
                // Probability
                const labelW = ctx.measureText(label + '  ').width;
                haloText(probText, lx + labelW, oy, '#8A7A5A', 0.7 * fade);
              }
            }
          }
        }
      }

      ctx.globalAlpha = 1;
    }
    requestAnimationFrame(frame);
  </script>
</body>
